name: Deploy site to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # No cache:pnpm — this job never runs pnpm install (Vercel builds remotely).
      # setup-node would error on post-job cache save when no pnpm store exists.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install -g vercel@latest

      # Run from repo root — if Root Directory on Vercel is "site", running from site/ doubles the path
      # and breaks Next.js detection (site/site). Same for local: `vercel --prod` from monorepo root.
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
